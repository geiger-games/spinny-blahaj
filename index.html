<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <title>spinny</title>
        <style>
            body {
                margin: 0;
                min-height: 100vh;

                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }
            body.basic {
                background: #312c42;
            }
            body.ocean {
                background: linear-gradient(#6ec6ff, #003366);
            }

            body.sunset {
                background: linear-gradient(#ff8a5b, #8a2be2);
            }

            body.space {
                background: radial-gradient(circle, #444, #000);
            }

            body.trans {
                background: linear-gradient(
                    180deg,
                    #5bcffa,
                    #f5abb9,
                    white,
                    #f5abb9,
                    #5bcffa
                );
            }
        </style>
    </head>
    <body class="basic">
        <p id="blahajtext"></p>
        <button onclick="talk()">make blahaj talk!</button>

        <video id="blahaj" controls autoplay loop>
            <source src="blahaj-spin.mp4" type="video/mp4">
        </video>

        <audio controls autoplay loop>
            <source src="xtal.flac" type="audio/x-flac">
        </audio>

        <button onclick="toggleZoomies()">zoomies</button>
        <button onclick="nextTheme()">next bg</button>

        <script>
            const themes = ["basic", "ocean", "sunset", "space", "trans"];
            const lines = ["hello human :3", "speeeeeeen", "pls catnip", "estrowogen"];
            const ttsLines = ["hello human", "spin", "please catnip", "estrogen"];
            let current = 0;

            function nextTheme() {
                document.body.className = themes[current];
                current = (current + 1) % themes.length;
            }

            function toggleZoomies() {
                const video = document.getElementById("blahaj");
                video.playbackRate = 4 - video.playbackRate;
            }

            function talk() {
                const text = document.getElementById("blahajtext");
                const i = Math.floor(Math.random() * lines.length);
                text.textContent = lines[i];

                const utter = new SpeechSynthesisUtterance(ttsLines[i]);
                utter.pitch = 1.5;
                speechSynthesis.speak(utter);
            }
        </script>
    </body>
</html>
